<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option B — scale: 2.4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #141210; }
    #shader-root { position: fixed; inset: 0; z-index: 0; }
    .overlay { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.35); }
    .label { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 2; color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div id="shader-root"></div>
  <div class="overlay"></div>
  <div class="label">Option B &mdash; scale 2.4 (very large blobs, most diffuse)</div>

  <script type="importmap">
  {
    "imports": {
      "react":                        "https://esm.sh/react@18",
      "react/jsx-runtime":            "https://esm.sh/react@18/jsx-runtime",
      "react-dom/client":             "https://esm.sh/react-dom@18/client",
      "@paper-design/shaders-react":  "https://esm.sh/@paper-design/shaders-react@latest?external=react"
    }
  }
  </script>
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { GrainGradient, grainGradientPresets } from '@paper-design/shaders-react';
    createRoot(document.getElementById('shader-root')).render(
      React.createElement(GrainGradient, {
        ...grainGradientPresets[0],
        colors: ['#1A1512', '#7A4428', '#C4B096', '#1C2B2F'],
        scale: 2.4,
        style: { width: '100%', height: '100%' }
      })
    );
  </script>
</body>
</html>
